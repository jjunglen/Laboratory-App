<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The Laboratory DTX Database Schema</title>
  <desc>Entity relationship diagram showing 7 tables and their foreign key connections</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
      .ts { font-size: 12px; fill: #444; }
      .blue-rect { fill: #E6F1FB; stroke: #185FA5; }
      .teal-rect { fill: #E1F5EE; stroke: #0F6E56; }
      .gray-rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .amber-rect { fill: #FAEEDA; stroke: #854F0B; }
      .coral-rect { fill: #FAECE7; stroke: #993C1D; }
      .blue-th { fill: #0C447C; }
      .teal-th { fill: #085041; }
      .gray-th { fill: #444441; }
      .amber-th { fill: #633806; }
      .coral-th { fill: #711B13; }
      .blue-ts { fill: #185FA5; }
      .teal-ts { fill: #0F6E56; }
      .gray-ts { fill: #5F5E5A; }
      .amber-ts { fill: #854F0B; }
      .coral-ts { fill: #993C1D; }
      .connector { fill: none; stroke: #aaa; stroke-width: 1; }
    </style>
  </defs>

  <!-- USERS -->
  <rect class="blue-rect" x="240" y="30" width="200" height="120" rx="8" stroke-width="0.5"/>
  <text class="th blue-th" x="340" y="50" text-anchor="middle" dominant-baseline="central">users</text>
  <text class="ts blue-ts" x="256" y="78" dominant-baseline="central">id, auth_id</text>
  <text class="ts blue-ts" x="256" y="96" dominant-baseline="central">email, full_name</text>
  <text class="ts blue-ts" x="256" y="114" dominant-baseline="central">notify_email, notify_inapp</text>
  <text class="ts blue-ts" x="256" y="132" dominant-baseline="central">created_at, updated_at</text>

  <!-- PREFERENCES -->
  <rect class="teal-rect" x="30" y="230" width="190" height="110" rx="8" stroke-width="0.5"/>
  <text class="th teal-th" x="125" y="252" text-anchor="middle" dominant-baseline="central">preferences</text>
  <text class="ts teal-ts" x="46" y="278" dominant-baseline="central">id, user_id (FK)</text>
  <text class="ts teal-ts" x="46" y="296" dominant-baseline="central">brands[ ], sizes[ ]</text>
  <text class="ts teal-ts" x="46" y="314" dominant-baseline="central">min_price, max_price</text>
  <text class="ts teal-ts" x="46" y="332" dominant-baseline="central">created_at, updated_at</text>

  <!-- ALERTS -->
  <rect class="blue-rect" x="240" y="230" width="200" height="130" rx="8" stroke-width="0.5"/>
  <text class="th blue-th" x="340" y="252" text-anchor="middle" dominant-baseline="central">alerts</text>
  <text class="ts blue-ts" x="256" y="278" dominant-baseline="central">id, user_id (FK)</text>
  <text class="ts blue-ts" x="256" y="296" dominant-baseline="central">stockx_product_id, sku</text>
  <text class="ts blue-ts" x="256" y="314" dominant-baseline="central">shoe_name, size</text>
  <text class="ts blue-ts" x="256" y="332" dominant-baseline="central">max_price, active</text>
  <text class="ts blue-ts" x="256" y="350" dominant-baseline="central">notify_email, notify_inapp</text>

  <!-- INVENTORY -->
  <rect class="gray-rect" x="460" y="230" width="190" height="130" rx="8" stroke-width="0.5"/>
  <text class="th gray-th" x="555" y="252" text-anchor="middle" dominant-baseline="central">inventory</text>
  <text class="ts gray-ts" x="476" y="278" dominant-baseline="central">id, shopify_product_id</text>
  <text class="ts gray-ts" x="476" y="296" dominant-baseline="central">shoe_name, sku, size</text>
  <text class="ts gray-ts" x="476" y="314" dominant-baseline="central">price, available</text>
  <text class="ts gray-ts" x="476" y="332" dominant-baseline="central">shopify_url, image_url</text>
  <text class="ts gray-ts" x="476" y="350" dominant-baseline="central">last_synced_at</text>

  <!-- NOTIFICATION LOGS -->
  <rect class="teal-rect" x="30" y="460" width="190" height="120" rx="8" stroke-width="0.5"/>
  <text class="th teal-th" x="125" y="482" text-anchor="middle" dominant-baseline="central">notification_logs</text>
  <text class="ts teal-ts" x="46" y="508" dominant-baseline="central">id, user_id (FK)</text>
  <text class="ts teal-ts" x="46" y="526" dominant-baseline="central">alert_id (FK)</text>
  <text class="ts teal-ts" x="46" y="544" dominant-baseline="central">channel, message</text>
  <text class="ts teal-ts" x="46" y="562" dominant-baseline="central">read, opened, sent_at</text>

  <!-- ALERT CLICKS -->
  <rect class="amber-rect" x="240" y="460" width="200" height="120" rx="8" stroke-width="0.5"/>
  <text class="th amber-th" x="340" y="482" text-anchor="middle" dominant-baseline="central">alert_clicks</text>
  <text class="ts amber-ts" x="256" y="508" dominant-baseline="central">id, user_id (FK)</text>
  <text class="ts amber-ts" x="256" y="526" dominant-baseline="central">alert_id (FK)</text>
  <text class="ts amber-ts" x="256" y="544" dominant-baseline="central">notification_id (FK)</text>
  <text class="ts amber-ts" x="256" y="562" dominant-baseline="central">shoe_name, sku, size</text>

  <!-- PURCHASES -->
  <rect class="coral-rect" x="460" y="460" width="190" height="130" rx="8" stroke-width="0.5"/>
  <text class="th coral-th" x="555" y="482" text-anchor="middle" dominant-baseline="central">purchases</text>
  <text class="ts coral-ts" x="476" y="508" dominant-baseline="central">id, user_id (FK)</text>
  <text class="ts coral-ts" x="476" y="526" dominant-baseline="central">alert_id (FK)</text>
  <text class="ts coral-ts" x="476" y="544" dominant-baseline="central">shopify_order_id</text>
  <text class="ts coral-ts" x="476" y="562" dominant-baseline="central">shoe_name, sku, size</text>
  <text class="ts coral-ts" x="476" y="580" dominant-baseline="central">price_paid, purchased_at</text>

  <!-- Connectors -->
  <!-- users -> preferences -->
  <path class="connector" d="M 125 230 L 125 185 L 290 185 L 290 150" marker-end="url(#arrow)"/>
  <!-- users -> alerts -->
  <line class="connector" x1="340" y1="150" x2="340" y2="230" marker-end="url(#arrow)"/>
  <!-- users -> notification_logs -->
  <path class="connector" d="M 240 120 L 190 120 L 190 420 L 125 420 L 125 460" marker-end="url(#arrow)"/>
  <!-- users -> alert_clicks -->
  <path class="connector" d="M 240 130 L 210 130 L 210 440 L 290 440 L 290 460" marker-end="url(#arrow)"/>
  <!-- users -> purchases -->
  <path class="connector" d="M 440 100 L 650 100 L 650 440 L 555 440 L 555 460" marker-end="url(#arrow)"/>
  <!-- alerts -> notification_logs -->
  <path class="connector" d="M 270 360 L 270 410 L 80 410 L 80 460" marker-end="url(#arrow)"/>
  <!-- alerts -> alert_clicks -->
  <path class="connector" d="M 310 360 L 310 460" marker-end="url(#arrow)"/>
  <!-- alerts -> purchases -->
  <path class="connector" d="M 410 310 L 430 310 L 430 510 L 460 510" marker-end="url(#arrow)"/>
  <!-- notification_logs -> alert_clicks -->
  <path class="connector" d="M 220 530 L 240 530" marker-end="url(#arrow)"/>
  <!-- inventory label -->
  <text class="ts gray-ts" x="555" y="212" text-anchor="middle">via Shopify webhook</text>
  <line class="connector" x1="555" y1="218" x2="555" y2="230" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <line class="connector" x1="40" y1="700" x2="80" y2="700" marker-end="url(#arrow)"/>
  <text class="ts" x="88" y="704" dominant-baseline="central">foreign key relationship</text>

  <rect class="blue-rect" x="40" y="724" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="62" y="731" dominant-baseline="central">user-facing data</text>

  <rect class="teal-rect" x="180" y="724" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="202" y="731" dominant-baseline="central">preferences / notifications</text>

  <rect class="amber-rect" x="380" y="724" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="402" y="731" dominant-baseline="central">click tracking</text>

  <rect class="coral-rect" x="500" y="724" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="522" y="731" dominant-baseline="central">purchase tracking</text>

  <rect class="gray-rect" x="40" y="752" width="14" height="14" rx="3" stroke-width="0.5"/>
  <text class="ts" x="62" y="759" dominant-baseline="central">Shopify synced inventory</text>

  <text class="ts" x="340" y="795" text-anchor="middle">The Laboratory DTX — Database Schema</text>
</svg>
